<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Komfort Uborka — Профиль</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1e40ff"/>
  <link rel="icon" type="image/png" href="favicon-32.png"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Komfort"/>
  <meta name="mobile-web-app-capable" content="yes"/>

  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="theme.css"/>
  <link rel="stylesheet" href="responsive.css"/>
  <style>
    .phone-field { display:flex; align-items:center; gap:6px; border:1px solid #d0d5dd; border-radius:12px; background:#fff; padding:0 14px; }
    .phone-field .phone-prefix { font-weight:700; color:#101828; white-space:nowrap; }
    .phone-field input { flex:1; border:none !important; background:transparent !important; padding:13px 0 !important; outline:none !important; box-shadow:none !important; font-size:1rem; }
    .profile-passport-box { margin-top:8px; border:1.5px dashed #d0d5dd; border-radius:14px; overflow:hidden; background:rgba(0,0,0,0.02); min-height:130px; display:flex; align-items:center; justify-content:center; }
    .profile-passport-box img { width:100%; max-height:260px; object-fit:contain; display:block; }
  </style>
</head>
<body class="login-body">

  <div class="bg-mesh" aria-hidden="true">
    <div class="mesh-blob mesh-blob-1"></div>
    <div class="mesh-blob mesh-blob-2"></div>
    <div class="mesh-blob mesh-blob-3"></div>
  </div>

  <div class="profile-shell">
    <!-- Переключатель языка -->
    <div class="login-lang-row" id="profileLangRow"></div>

    <div class="profile-card">
      <div class="profile-welcome">
        <div class="profile-welcome-icon"><i class="fa-solid fa-id-card"></i></div>
        <h1 data-i18n="profile.title">Заполните профиль</h1>
        <p class="muted" data-i18n="profile.sub">Это нужно сделать один раз. Данные увидит только директор.</p>
      </div>

      <!-- Аватар -->
      <div class="profile-avatar-section">
        <div class="profile-avatar-box" id="profileAvatarBox">
          <div class="profile-avatar-empty" id="profileAvatarEmpty">
            <i class="fa-solid fa-user"></i>
            <span data-i18n="profile.photoLabel">Фото профиля</span>
          </div>
          <img id="profileAvatarImg" style="display:none" alt="avatar"/>
        </div>

        <!-- Два отдельных input: камера и галерея -->
        <input type="file" id="avatarCameraInput" accept="image/*" capture="user" style="display:none" onchange="profileHandleAvatar(event)"/>
        <input type="file" id="avatarGalleryInput" accept="image/*" style="display:none" onchange="profileHandleAvatar(event)"/>

        <div class="profile-photo-buttons">
          <button type="button" class="primary profile-photo-btn" onclick="document.getElementById('avatarCameraInput').click()">
            <i class="fa-solid fa-camera"></i>
            <span data-i18n="profile.takePhoto">Снять фото</span>
          </button>
          <button type="button" class="ghost-btn profile-photo-btn" onclick="document.getElementById('avatarGalleryInput').click()">
            <i class="fa-solid fa-images"></i>
            <span data-i18n="profile.fromGallery">Из галереи</span>
          </button>
        </div>
        <div class="profile-avatar-hint muted" data-i18n="profile.photoHint2">Сделайте селфи камерой или выберите готовое фото</div>
      </div>

      <!-- Имя -->
      <label class="field">
        <span class="field-label"><i class="fa-solid fa-user"></i> <span data-i18n="profile.firstName">Имя</span> <span class="req">*</span></span>
        <input type="text" id="pFirstName" autocomplete="given-name" data-i18n-ph="profile.firstNamePh" placeholder="Например: Алишер"/>
      </label>

      <!-- Фамилия -->
      <label class="field">
        <span class="field-label"><i class="fa-solid fa-user"></i> <span data-i18n="profile.lastName">Фамилия</span> <span class="req">*</span></span>
        <input type="text" id="pLastName" autocomplete="family-name" data-i18n-ph="profile.lastNamePh" placeholder="Например: Каримов"/>
      </label>

      <!-- Дата рождения -->
      <label class="field">
        <span class="field-label"><i class="fa-solid fa-cake-candles"></i> <span data-i18n="profile.birthDate">Дата рождения</span> <span class="req">*</span></span>
        <input type="date" id="pBirthDate"/>
      </label>

      <!-- Телефон (код +998 закреплён) -->
      <label class="field">
        <span class="field-label"><i class="fa-solid fa-phone"></i> <span data-i18n="profile.phone">Номер телефона</span> <span class="req">*</span></span>
        <div class="phone-field">
          <span class="phone-prefix">+998</span>
          <input type="tel" id="pPhone" inputmode="numeric" maxlength="9" autocomplete="tel"
                 oninput="this.value=this.value.replace(/\D/g,'').slice(0,9)"/>
        </div>
      </label>

      <!-- Адрес с геолокацией -->
      <label class="field">
        <span class="field-label"><i class="fa-solid fa-location-dot"></i> <span data-i18n="profile.address">Адрес проживания</span></span>
        <div class="profile-address-row">
          <input type="text" id="pAddress" autocomplete="street-address" data-i18n-ph="profile.addressPh" placeholder="Где вы проживаете"/>
          <button type="button" class="ghost-btn small" onclick="profileDetectLocation()" id="pDetectBtn">
            <i class="fa-solid fa-location-crosshairs"></i>
            <span data-i18n="profile.detect">Определить</span>
          </button>
        </div>
        <div id="pAddressStatus" class="address-status" style="display:none"></div>
      </label>

      <!-- Паспорт -->
      <div class="field">
        <span class="field-label"><i class="fa-solid fa-passport"></i> <span data-i18n="profile.passport">Паспорт (фото)</span> <span class="req">*</span></span>
        <div class="profile-passport-box" id="profilePassportBox">
          <div id="profilePassportEmpty" style="text-align:center; color:#98a2b3; padding:24px;">
            <i class="fa-solid fa-id-card" style="font-size:2rem;"></i>
            <div data-i18n="profile.passportHint" style="margin-top:6px; font-size:.85rem;">Сфотографируйте паспорт (обе стороны можно по очереди)</div>
          </div>
          <img id="profilePassportImg" style="display:none" alt="passport"/>
        </div>
        <input type="file" id="passportCameraInput" accept="image/*" capture="environment" style="display:none" onchange="profileHandlePassport(event)"/>
        <input type="file" id="passportGalleryInput" accept="image/*" style="display:none" onchange="profileHandlePassport(event)"/>
        <div class="profile-photo-buttons" style="margin-top:10px;">
          <button type="button" class="primary profile-photo-btn" onclick="document.getElementById('passportCameraInput').click()">
            <i class="fa-solid fa-camera"></i> <span data-i18n="profile.passportTake">Сфоткать паспорт</span>
          </button>
          <button type="button" class="ghost-btn profile-photo-btn" onclick="document.getElementById('passportGalleryInput').click()">
            <i class="fa-solid fa-images"></i> <span data-i18n="profile.fromGallery">Из галереи</span>
          </button>
        </div>
      </div>

      <div id="profileError" class="login-error" style="display:none"></div>

      <button class="primary login-submit" onclick="profileSubmit()" id="profileSubmitBtn">
        <i class="fa-solid fa-check"></i>
        <span data-i18n="profile.submit">Сохранить и продолжить</span>
      </button>

      <button class="ghost-btn profile-logout-btn" onclick="profileLogout()">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span data-i18n="nav.logout">Выйти</span>
      </button>
    </div>
  </div>

  <div id="toastRoot" class="toast-root" aria-live="polite" aria-atomic="true"></div>

  <script src="i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-client.js"></script>
  <script src="auth.js"></script>
  <script src="supabase-data.js"></script>
  <script src="profile.js"></script>
  <script src="pwa.js"></script>
</body>
</html>
