<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Komfort Uborka — Архив чеков</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#1e40ff"/>
  <link rel="icon" type="image/png" href="favicon-32.png"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Komfort"/>
  <meta name="mobile-web-app-capable" content="yes"/>

  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="archive.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="theme.css"/>
  <link rel="stylesheet" href="responsive.css"/>
</head>
<body class="archive-body">

  <div class="bg-mesh" aria-hidden="true">
    <div class="mesh-blob mesh-blob-1"></div>
    <div class="mesh-blob mesh-blob-2"></div>
    <div class="mesh-blob mesh-blob-3"></div>
  </div>

  <!-- Шапка -->
  <header class="navbar archive-navbar">
    <div class="nav-left">
      <button class="ghost-btn small" onclick="archiveGoBack()" id="archiveBackBtn">
        <i class="fa-solid fa-arrow-left"></i>
        <span data-i18n="nav.back">Назад</span>
      </button>
    </div>

    <div class="nav-center">
      <a href="index.html" class="brand-text" id="brandText">
        <i class="fa-solid fa-broom" data-brand-icon></i>
        <span>KOMFORT</span>
      </a>
    </div>

    <div class="nav-right">
      <span class="user-chip" id="archiveUserChip">—</span>
      <button onclick="doArchiveLogout()" class="nav-button nav-button-danger">
        <i class="fa-solid fa-right-from-bracket"></i><span class="btn-text" data-i18n="nav.logout">Выйти</span>
      </button>
    </div>
  </header>

  <!-- Заголовок страницы -->
  <section class="archive-hero">
    <div class="archive-hero-inner">
      <div class="archive-hero-icon"><i class="fa-solid fa-box-archive"></i></div>
      <div>
        <h1 data-i18n="archive.title">Архив чеков</h1>
        <p class="muted" data-i18n="archive.sub">Все заказы за всё время. Можно искать, фильтровать, редактировать и удалять.</p>
      </div>
    </div>

    <!-- Сводка -->
    <div class="archive-stats">
      <div class="archive-stat">
        <div class="archive-stat-value" id="aStatTotal">0</div>
        <div class="archive-stat-label muted" data-i18n="archive.statTotal">Всего чеков</div>
      </div>
      <div class="archive-stat">
        <div class="archive-stat-value" id="aStatPaid">0</div>
        <div class="archive-stat-label muted" data-i18n="archive.statPaid">Оплачено</div>
      </div>
      <div class="archive-stat">
        <div class="archive-stat-value" id="aStatPending">0</div>
        <div class="archive-stat-label muted" data-i18n="archive.statPending">Ожидают</div>
      </div>
      <div class="archive-stat archive-stat-money">
        <div class="archive-stat-value" id="aStatRevenue">0</div>
        <div class="archive-stat-label muted" data-i18n="archive.statRevenue">Выручка</div>
      </div>
    </div>
  </section>

  <!-- Фильтры -->
  <section class="archive-filters">
    <div class="archive-filters-row">
      <div class="archive-filter">
        <label class="label"><i class="fa-solid fa-magnifying-glass"></i> <span data-i18n="archive.search">Поиск</span></label>
        <input type="text" id="aFilterSearch" data-i18n-ph="archive.searchPh" placeholder="Имя, телефон, адрес, ID..."/>
      </div>
      <div class="archive-filter">
        <label class="label"><i class="fa-regular fa-calendar"></i> <span data-i18n="archive.dateFrom">С даты</span></label>
        <input type="date" id="aFilterFrom"/>
      </div>
      <div class="archive-filter">
        <label class="label"><i class="fa-regular fa-calendar"></i> <span data-i18n="archive.dateTo">По дату</span></label>
        <input type="date" id="aFilterTo"/>
      </div>
      <div class="archive-filter">
        <label class="label"><i class="fa-solid fa-money-bill"></i> <span data-i18n="archive.payment">Оплата</span></label>
        <select id="aFilterPayment">
          <option value="" data-i18n="archive.paymentAll">Все</option>
          <option value="paid" data-i18n="order.paid">Оплачен</option>
          <option value="unpaid" data-i18n="order.unpaid">Не оплачен</option>
          <option value="draft" data-i18n="order.draft">Черновик</option>
        </select>
      </div>
      <div class="archive-filter">
        <label class="label"><i class="fa-solid fa-broom"></i> <span data-i18n="archive.service">Услуга</span></label>
        <select id="aFilterService">
          <option value="" data-i18n="archive.serviceAll">Все услуги</option>
        </select>
      </div>
    </div>
    <div class="archive-filters-row archive-filters-actions">
      <button class="ghost-btn" onclick="archiveResetFilters()">
        <i class="fa-solid fa-rotate-left"></i>
        <span data-i18n="archive.reset">Сбросить</span>
      </button>
      <div class="muted archive-result-count" id="aResultCount">—</div>
      <div style="flex:1"></div>
      <button class="ghost-btn" onclick="archiveExportCsv()">
        <i class="fa-solid fa-download"></i>
        <span data-i18n="archive.exportCsv">Экспорт CSV</span>
      </button>
    </div>
  </section>

  <!-- Список чеков -->
  <section class="archive-list-section">
    <div id="archiveList" class="archive-list"></div>
  </section>

  <!-- ============ Чек заказа (полноценный) ============ -->
  <div id="receiptModal" class="modal" aria-hidden="true">
    <div class="modal-content receipt-modal">
      <button class="close" onclick="closeReceipt()" aria-label="Close">&times;</button>
      <div id="receiptBody"></div>
      <div class="receipt-actions">
        <button class="ghost-btn" onclick="printReceipt()">
          <i class="fa-solid fa-print"></i>
          <span data-i18n="receipt.print">Печать</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ============ Редактирование заказа ============ -->
  <div id="editOrderModal" class="modal" aria-hidden="true">
    <div class="modal-content modal-content-wide">
      <button class="close" onclick="closeEditOrderModal()" aria-label="Close">&times;</button>

      <div class="edit-order-head">
        <div class="edit-order-icon"><i class="fa-solid fa-pen-to-square"></i></div>
        <div>
          <h2 data-i18n="archive.editTitle">Редактирование заказа</h2>
          <p class="muted" id="editOrderId">#—</p>
        </div>
      </div>

      <!-- Клиент -->
      <div class="order-block">
        <div class="order-block-title">
          <i class="fa-solid fa-user"></i> <span data-i18n="order.client">Клиент</span>
        </div>
        <div class="grid-2">
          <input type="text" id="eName" placeholder="Имя"/>
          <input type="tel" id="ePhone" placeholder="Телефон"/>
        </div>
      </div>

      <!-- Адрес -->
      <div class="order-block">
        <div class="order-block-title">
          <i class="fa-solid fa-location-dot"></i> <span data-i18n="receipt.address">Адрес</span>
        </div>
        <input type="text" id="eAddress" placeholder="Адрес"/>
      </div>

      <!-- Дата/время -->
      <div class="order-block">
        <div class="order-block-title">
          <i class="fa-solid fa-calendar"></i> <span data-i18n="receipt.scheduled">Дата и время</span>
        </div>
        <div class="grid-2">
          <input type="date" id="eDate"/>
          <input type="time" id="eTime"/>
        </div>
      </div>

      <!-- Деньги -->
      <div class="order-block">
        <div class="order-block-title">
          <i class="fa-solid fa-money-bill-wave"></i> <span data-i18n="order.payStatus">Стоимость и оплата</span>
        </div>
        <div class="grid-2">
          <div>
            <label class="label" data-i18n="order.price">Цена (Сум)</label>
            <input type="number" id="ePrice" min="0"/>
          </div>
          <div>
            <label class="label" data-i18n="order.advance">Аванс (Сум)</label>
            <input type="number" id="eAdvance" min="0"/>
          </div>
        </div>
        <div class="order-remaining">
          <span class="muted" data-i18n="order.remaining">К доплате</span>
          <strong id="eRemaining">0 Сум</strong>
        </div>

        <label class="label" style="margin-top:14px" data-i18n="order.payStatus">Статус оплаты</label>
        <div class="payment-options">
          <label class="pay-opt">
            <input type="radio" name="ePayment" value="paid"/>
            <span class="pay-pill pay-paid"><i class="fa-solid fa-check"></i> <span data-i18n="order.paid">Оплачен</span></span>
          </label>
          <label class="pay-opt">
            <input type="radio" name="ePayment" value="unpaid"/>
            <span class="pay-pill pay-unpaid"><i class="fa-solid fa-xmark"></i> <span data-i18n="order.unpaid">Не оплачен</span></span>
          </label>
          <label class="pay-opt">
            <input type="radio" name="ePayment" value="draft"/>
            <span class="pay-pill pay-draft"><i class="fa-solid fa-pen-ruler"></i> <span data-i18n="order.draft">Черновик</span></span>
          </label>
        </div>
      </div>

      <div id="eError" class="login-error" style="display:none"></div>

      <div class="edit-order-actions">
        <button class="ghost-btn dir-order-del" onclick="archiveDeleteOrder()" id="eDeleteBtn">
          <i class="fa-solid fa-trash"></i>
          <span data-i18n="archive.delete">Удалить</span>
        </button>
        <button class="primary" onclick="archiveSaveOrder()">
          <i class="fa-solid fa-floppy-disk"></i>
          <span data-i18n="archive.save">Сохранить</span>
        </button>
      </div>
    </div>
  </div>

  <div id="toastRoot" class="toast-root" aria-live="polite" aria-atomic="true"></div>

  <script src="i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase-client.js"></script>
  <script src="qrcode.js"></script>
  <script src="auth.js"></script>
  <script src="supabase-data.js"></script>
  <script src="archive.js"></script>
  <script src="pwa.js"></script>
</body>
</html>
